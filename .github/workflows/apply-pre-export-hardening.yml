name: Apply pre-export hardening

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Expand hardening package
        run: |
          rm -rf .legend-vault-hardening
          mkdir .legend-vault-hardening
          unzip -q legend-vault-pre-export-hardening.zip -d .legend-vault-hardening

      - name: Apply payload
        run: python .legend-vault-hardening/apply.py

      - name: Install package
        run: python -m pip install -e .

      - name: Compile source and tests
        run: python -m compileall -q src tests

      - name: Run complete current test path
        run: python tests/test_synthetic_end_to_end.py

      - name: Commit applied changes
        run: |
          rm -rf .legend-vault-hardening
          rm -f legend-vault-pre-export-hardening.zip
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md docs tests
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "Add pre-export readiness audit and verifier fault tests"
          git push
